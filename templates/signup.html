<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up · NeuroScan AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", system-ui, sans-serif;
            background: #030614;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        .bg-grid {
            position: absolute; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0; pointer-events: none;
        }

        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); z-index: 0;
        }
        .orb-1 { width: 460px; height: 460px; top: -190px; left: -100px; background: rgba(0, 212, 255, 0.18); }
        .orb-2 { width: 560px; height: 560px; bottom: -260px; right: -130px; background: rgba(100, 0, 255, 0.12); }

        .card {
            position: relative; z-index: 10;
            width: 480px; max-width: 92%;
            background: rgba(10, 22, 40, 0.82);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(64, 164, 255, 0.22);
            border-radius: 48px;
            padding: 3rem 2.8rem;
            box-shadow: 0 40px 80px -20px rgba(0, 10, 40, 0.9), 0 0 0 1px rgba(0, 200, 255, 0.08) inset;
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-4px); }

        .brand-row {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 60px; height: 60px;
            background: linear-gradient(145deg, #003366, #0a4d8c);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 12px 24px -8px #001d4a, 0 0 0 1px #3f9eff inset;
        }

        .brand-icon i { font-size: 2rem; color: white; }

        .brand-name {
            font-size: 1.6rem; font-weight: 700;
            background: linear-gradient(to right, #fff, #b0e0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 1.9rem; font-weight: 700; color: white;
            margin-bottom: 0.4rem;
        }

        .subtitle { color: #8ab5d8; font-size: 0.98rem; margin-bottom: 2rem; }

        .badge-otp {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0, 200, 100, 0.1);
            border: 1px solid rgba(0, 200, 100, 0.3);
            border-radius: 60px;
            padding: 6px 16px;
            font-size: 0.82rem; font-weight: 600;
            color: #5de5a0;
            margin-bottom: 1.8rem;
        }

        .badge-otp i { color: #3dd68c; }

        .input-group { margin-bottom: 1.4rem; }

        label {
            display: block;
            font-size: 0.8rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: #9ab8d8; margin-bottom: 8px; margin-left: 6px;
        }

        .field { position: relative; }

        .field i.icon {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem; color: #3f8bcb; z-index: 2;
        }

        input {
            width: 100%;
            background: rgba(0, 20, 45, 0.65);
            border: 2px solid rgba(0, 140, 255, 0.22);
            border-radius: 28px;
            padding: 0.9rem 1rem 0.9rem 3.2rem;
            font-size: 1rem; font-weight: 500;
            color: white; outline: none;
            transition: all 0.25s;
            font-family: "Inter", sans-serif;
        }

        input:focus {
            border-color: #2a9eff;
            background: rgba(0, 30, 60, 0.85);
            box-shadow: 0 0 0 5px rgba(0, 160, 255, 0.14);
        }

        input::placeholder { color: #4d7ba5; font-weight: 400; opacity: 0.8; font-size: 0.95rem; }

        .btn {
            width: 100%;
            background: linear-gradient(145deg, #004a99, #002b66);
            border: none; border-radius: 60px;
            padding: 1.1rem;
            font-size: 1.15rem; font-weight: 700;
            color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 18px 30px -12px #001d4a, 0 0 0 1px #2a7fff inset;
            transition: all 0.25s;
            margin-top: 0.8rem;
            font-family: "Inter", sans-serif;
        }

        .btn i { font-size: 1.4rem; transition: transform 0.3s; }

        .btn:hover {
            background: linear-gradient(145deg, #005fc9, #003c88);
            transform: scale(1.02);
            gap: 18px;
            box-shadow: 0 24px 40px -12px #002f6a, 0 0 0 2px #5aadff inset;
        }

        .btn:hover i { transform: translateX(5px); }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 1.6rem 0;
            color: #3d5e80; font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: ""; flex: 1;
            height: 1px; background: rgba(0, 140, 255, 0.15);
        }

        .footer-links {
            text-align: center; margin-top: 1.6rem;
            color: #6895be; font-size: 0.9rem;
        }
        .footer-links a { color: #2a9eff; text-decoration: none; font-weight: 700; }

        .alert-msg {
            display: flex; align-items: center; gap: 10px;
            border-radius: 18px; padding: 0.9rem 1.1rem;
            font-size: 0.9rem; margin-bottom: 1.4rem;
        }
        .alert-error {
            background: rgba(255,50,50,0.1);
            border: 1px solid rgba(255,80,80,0.3);
            color: #ffaaaa;
        }
        .alert-error i { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <!-- Brand Header -->
        <div class="brand-row">
            <div class="brand-icon">
                <i class="bi bi-cpu"></i>
            </div>
            <span class="brand-name">NeuroScan AI</span>
        </div>

        <h2>Create Account</h2>
        <p class="subtitle">Join the future of neural diagnostics</p>

        <div class="badge-otp">
            <i class="bi bi-shield-check-fill"></i>
            Email will be verified via OTP
        </div>

        {% if error %}
        <div class="alert-msg alert-error">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="post" action="/signup/">
            {% csrf_token %}
            <div class="input-group">
                <label><i class="bi bi-person" style="margin-right:5px;"></i>Full Name</label>
                <div class="field">
                    <i class="bi bi-person-fill icon"></i>
                    <input type="text" name="name" placeholder="Dr. John Doe" required>
                </div>
            </div>

            <div class="input-group">
                <label><i class="bi bi-envelope" style="margin-right:5px;"></i>Email Address</label>
                <div class="field">
                    <i class="bi bi-envelope-fill icon"></i>
                    <input type="email" name="email" placeholder="john@hospital.org" required>
                </div>
            </div>

            <div class="input-group">
                <label><i class="bi bi-lock" style="margin-right:5px;"></i>Password</label>
                <div class="field">
                    <i class="bi bi-key-fill icon"></i>
                    <input type="password" name="password" placeholder="Minimum 6 characters" required minlength="6">
                </div>
            </div>

            <button type="submit" class="btn">
                <span>Create Account &amp; Verify</span>
                <i class="bi bi-arrow-right-circle-fill"></i>
            </button>
        </form>

        <div class="divider">or</div>

        <div class="footer-links">
            Already have an account? <a href="/">Login</a>
        </div>
    </div>
</body>
</html>
