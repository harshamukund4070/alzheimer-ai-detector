<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroScan AI · Verify OTP</title>
    <!-- Google Font & Bootstrap Icons (lightweight) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            background: #030614;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* animated medical grid background */
        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 200, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 180, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* floating orbs (secure/medical vibe) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            top: -150px;
            right: -100px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.2), rgba(0, 50, 130, 0.1));
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            bottom: -200px;
            left: -150px;
            background: radial-gradient(circle, rgba(100, 0, 255, 0.15), rgba(0, 70, 150, 0.05));
        }

        /* main card — premium glass panel */
        .otp-card {
            position: relative;
            z-index: 10;
            width: 460px;
            max-width: 92%;
            background: rgba(10, 22, 40, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 200, 255, 0.25);
            border-radius: 48px;
            padding: 2.8rem 2.4rem;
            box-shadow: 0 40px 70px -20px rgba(0, 20, 60, 0.9), 0 0 0 1px rgba(0, 200, 255, 0.2) inset;
            transition: transform 0.3s ease;
        }

        .otp-card:hover {
            box-shadow: 0 50px 90px -15px #002856, 0 0 0 1px rgba(0, 225, 255, 0.4) inset;
        }

        /* header with secure badge */
        .header-icon {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 2rem;
        }

        .shield-logo {
            width: 65px;
            height: 65px;
            background: linear-gradient(145deg, #003d7a, #001f4a);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 25px -10px #001d4a, 0 0 0 1px #3f9eff inset;
        }

        .shield-logo i {
            font-size: 2.4rem;
            color: white;
            filter: drop-shadow(0 2px 5px rgba(0,160,255,0.6));
        }

        .badge-secure {
            background: rgba(0, 200, 255, 0.08);
            border: 1px solid rgba(0, 180, 255, 0.4);
            border-radius: 60px;
            padding: 6px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #b2ecff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }

        .badge-secure i {
            color: #40dcff;
            font-size: 1rem;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #aad4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 0.25rem 0;
            line-height: 1.2;
        }

        .email-hint {
            font-size: 0.95rem;
            color: #8fb4da;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 150, 255, 0.1);
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(0, 200, 255, 0.2);
        }

        .email-hint i {
            color: #42b5ff;
            font-size: 1.1rem;
        }

        .email-highlight {
            font-weight: 700;
            color: white;
            background: rgba(0, 160, 255, 0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }

        /* OTP input group — modern floating style */
        .input-group {
            margin-bottom: 2rem;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #9dc3f0;
            margin-bottom: 14px;
            margin-left: 10px;
        }

        .input-label i {
            color: #3d9eff;
        }

        .input-field {
            position: relative;
        }

        .input-field i {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4rem;
            color: #4a9eff;
            z-index: 2;
            opacity: 0.9;
        }

        input {
            width: 100%;
            background: rgba(0, 25, 55, 0.7);
            border: 2px solid rgba(0, 150, 255, 0.3);
            border-radius: 40px;
            padding: 1.2rem 1.2rem 1.2rem 3.8rem;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 4px;
            color: white;
            outline: none;
            transition: all 0.25s;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        input:focus {
            border-color: #3aacff;
            background: rgba(0, 35, 70, 0.9);
            box-shadow: 0 0 0 6px rgba(0, 160, 255, 0.2), 0 15px 20px -10px #001a3a inset;
        }

        input::placeholder {
            color: #4f7fb0;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 1px;
            opacity: 0.6;
            text-align: center;
        }

        /* timer and security row */
        .security-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1.2rem 0 2rem;
            font-size: 1rem;
        }

        .timer-badge {
            background: rgba(0, 30, 60, 0.7);
            border: 1px solid #2d7ecf;
            padding: 8px 22px;
            border-radius: 60px;
            color: #bbdefa;
            font-weight: 600;
            backdrop-filter: blur(5px);
        }

        .timer-badge i {
            color: #50cdff;
            margin-right: 8px;
            font-size: 1.1rem;
        }

        .resend-link {
            color: #95c2ff;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(0, 80, 150, 0.3);
            border: 1px solid rgba(0, 200, 255, 0.2);
            transition: all 0.2s;
        }

        .resend-link:hover {
            background: #004b99;
            color: white;
            border-color: #4db8ff;
        }

        /* verify button — premium gradient */
        .btn-verify {
            background: linear-gradient(145deg, #0057b3, #002b66);
            border: none;
            border-radius: 60px;
            padding: 1.3rem 2rem;
            width: 100%;
            font-weight: 700;
            font-size: 1.4rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            box-shadow: 0 20px 35px -12px #001f5e, 0 0 0 1px #3d89ff inset;
            transition: all 0.25s;
            cursor: pointer;
            margin: 1rem 0;
        }

        .btn-verify i {
            font-size: 1.7rem;
            transition: transform 0.3s;
        }

        .btn-verify:hover {
            background: linear-gradient(145deg, #006fdb, #003d94);
            gap: 22px;
            box-shadow: 0 28px 45px -12px #003b8a, 0 0 0 2px #70bcff inset;
            transform: scale(1.02);
        }

        .btn-verify:hover i {
            transform: translateX(8px);
        }

        /* error message styling (preserved logic) */
        .error-message {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(255, 80, 80, 0.4);
            border-radius: 40px;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0 0.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(5px);
        }

        .error-message i {
            color: #ff6b6b;
            font-size: 1.5rem;
        }

        .error-message p {
            color: #ffb3b3;
            font-weight: 500;
            margin: 0;
            font-size: 1rem;
        }

        /* trust footer */
        .trust-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin-top: 2.5rem;
            color: #618dbb;
            font-size: 0.85rem;
        }

        .trust-footer span {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.02);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid rgba(0,150,255,0.2);
        }

        .trust-footer i {
            color: #4db3ff;
        }

        .footer-links {
            margin-top: 1.8rem;
            text-align: center;
            color: #3e6f9b;
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .footer-links a {
            color: #7bb3e8;
            text-decoration: none;
            border-bottom: 1px dotted #346fa5;
        }

        .footer-links a:hover {
            color: white;
            border-bottom-color: white;
        }

        /* django template tags preserved — hidden visually */
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- OTP verification card (all logic 100% intact) -->
    <div class="otp-card">

        <!-- header with shield and secure badge -->
        <div class="header-icon">
            <div class="shield-logo">
                <i class="bi bi-shield-check"></i>
            </div>
            <div>
                <h2>Verify OTP</h2>
                <div class="badge-secure">
                    <i class="bi bi-lock-fill"></i> 6-digit authentication
                </div>
            </div>
        </div>

        <!-- email hint (dynamic — you can set via Django variable if needed) -->
        <div class="email-hint">
            <i class="bi bi-envelope-fill"></i>
            <span>Code sent to <span class="email-highlight">r***@neuro.ai</span></span>
            <i class="bi bi-dot" style="color: #3db4ff;"></i>
            <span style="font-size:0.85rem;">expires in 10:00</span>
        </div>

        <!-- main form — EXACT original structure preserved -->
        <form method="post">
            <!-- django CSRF (hidden, exactly as before) -->
            <div style="display: none;">{% csrf_token %}</div>

            <!-- OTP input field (name="otp" preserved) -->
            <div class="input-group">
                <label class="input-label">
                    <i class="bi bi-key-fill"></i> ONE-TIME PASSWORD
                </label>
                <div class="input-field">
                    <i class="bi bi-123"></i>
                    <input type="text" name="otp" placeholder="• • • • • •" maxlength="6" autocomplete="off" required>
                </div>
            </div>

            <!-- timer and resend (UI only — no logic change) -->
            <div class="security-row">
                <span class="timer-badge"><i class="bi bi-hourglass-split"></i> <span id="timer">05:00</span></span>
                <a href="#" class="resend-link" onclick="return false;"><i class="bi bi-arrow-repeat"></i> Resend OTP</a>
            </div>

            <!-- verify button — type="submit" preserved -->
            <button type="submit" class="btn-verify">
                <span>Verify Identity</span>
                <i class="bi bi-check2-circle"></i>
            </button>

            <!-- trust badges (visual only) -->
            <div class="trust-footer">
                <span><i class="bi bi-shield-shaded"></i> 2FA active</span>
                <span><i class="bi bi-fingerprint"></i> biometric ready</span>
            </div>
        </form>

        <!-- ERROR DISPLAY — EXACT original logic preserved -->
        {% if error %}
        <div class="error-message">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <p>{{ error }}</p>
        </div>
        {% endif %}

        <!-- footer links (UI enhancement) -->
        <div class="footer-links">
            <a href="#"><i class="bi bi-question-circle"></i> need help?</a>
            <a href="#"><i class="bi bi-arrow-left"></i> back to login</a>
        </div>

        <!-- subtle secure note (cosmetic) -->
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: #346fa0; border-top: 1px dashed #1f5080; padding-top: 1rem;">
            <i class="bi bi-wifi"></i> end-to-end encrypted · HIPAA compliant session
        </div>
    </div>

    <!-- simple timer script (cosmetic only — does NOT affect backend) -->
    <script>
        (function() {
            // purely visual countdown (no backend impact)
            let timeLeft = 300; // 5 minutes in seconds
            const timerElement = document.getElementById('timer');
            
            function updateTimer() {
                if (timeLeft <= 0) {
                    timerElement.innerHTML = "00:00";
                    return;
                }
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.innerHTML = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            
            // update every second (just for show)
            setInterval(updateTimer, 1000);
            
            // subtle focus effect
            const otpInput = document.querySelector('input[name="otp"]');
            if(otpInput) {
                otpInput.addEventListener('focus', () => {
                    document.querySelector('.badge-secure').style.borderColor = '#00ccff';
                });
                otpInput.addEventListener('blur', () => {
                    document.querySelector('.badge-secure').style.borderColor = 'rgba(0, 180, 255, 0.4)';
                });
            }
        })();
    </script>
</body>
</html>
